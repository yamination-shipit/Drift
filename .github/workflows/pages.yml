name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -b gh-pages /tmp/drift-pages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/drift-pages
          fi
          rm -rf /tmp/drift-pages/*
          cp -R dist/. /tmp/drift-pages/
          touch /tmp/drift-pages/.nojekyll
          cd /tmp/drift-pages
          git add -A
          git commit -m "deploy: github pages" || exit 0
          git push origin gh-pages
